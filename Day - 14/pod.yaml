apiVersion: v1
kind: Pod

metadata:
  name: secret-pod

spec:
  containers:
    - name: nginx
      image: nginx

      env:
        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: username

        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: password
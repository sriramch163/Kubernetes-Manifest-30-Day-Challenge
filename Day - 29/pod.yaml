apiVersion: v1
kind: Pod

metadata:
  name: init-container-pod

spec:
  initContainers:
    - name: init-message
      image: busybox
      command:
        - sh
        - -c
        - "echo 'Initializing application...'; sleep 10"

  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
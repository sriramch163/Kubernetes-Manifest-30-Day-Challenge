apiVersion: v1
kind: Pod

metadata:
  name: multi-container-pod
  labels:
    app: multi-container

spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80

    - name: busybox
      image: busybox:latest
      command:
        - sh
        - -c
        - "while true; do echo 'BusyBox is running'; sleep 30; done"